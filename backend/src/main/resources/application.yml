spring:
  application:
    name: solvy-backend
  
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/solvy_db}
    username: ${SPRING_DATASOURCE_USERNAME:solvy_user}
    password: ${SPRING_DATASOURCE_PASSWORD:solvy_password}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

server:
  port: 8080
